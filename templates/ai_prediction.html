{% extends "base.html" %}

{% block content %}
<div class="md-card">
    <h2 class="md-card__headline">AI Price Prediction (Random Forest)</h2>
    <p style="color: var(--md-sys-color-on-surface-variant); margin-bottom: 2rem;">
        Train a Random Forest model on historical data to predict the next day's closing price.
        Features include Price, RSI, Bollinger Bands, MACD, ATR, SMA, and Volume.
    </p>

    <div class="md-text-field-container" style="max-width: 300px;">
        <input type="text" id="symbol" name="symbol" class="md-text-field" value="SPY" placeholder=" " required>
        <label for="symbol" class="md-text-field-label">Symbol</label>
    </div>

    <div class="ai-controls">
        <button id="btn-train" class="md-button md-button--tonal">Train Model</button>
        <button id="btn-predict" class="md-button md-button--filled">Predict Next Day</button>
    </div>

    <div id="ai-loading" class="hidden">Processing...</div>

    <div id="ai-result" class="hidden">
        <!-- Results populated by JS -->
    </div>
</div>
{% endblock %}
