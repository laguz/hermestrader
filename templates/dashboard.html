{% extends "base.html" %}

{% block content %}
<div class="md-card col-span-full">
    <h2 class="md-card__headline">Open Positions</h2>
    <div id="loading-positions" class="hidden">Loading positions...</div>
    <div id="positions-error" class="hidden" style="color: var(--md-sys-color-error, #ffb4ab);"></div>

    <div class="md-table-container">
        <table id="positions-table">
            <thead>
                <tr>
                    <th>Symbol</th>
                    <th>Qty</th>
                    <th>Cost Basis</th>
                    <th>Current Price</th>
                    <th>Market Value</th>
                    <th>PnL (Open)</th>
                    <th>PnL %</th>
                </tr>
            </thead>
            <tbody>
                <!-- Populated by JS -->
            </tbody>
        </table>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        loadPositions();
    });

    function loadPositions() {
        const tableBody = document.querySelector('#positions-table tbody');
        const loading = document.getElementById('loading-positions');

        loading.classList.remove('hidden');

        fetch('/api/positions')
            .then(response => response.json())
            .then(data => {
                loading.classList.add('hidden');
                tableBody.innerHTML = '';

                if (!data || data.length === 0) {
                    const row = tableBody.insertRow();
                    const cell = row.insertCell();
                    cell.colSpan = 7;
                    cell.textContent = "No open positions found.";
                    cell.style.textAlign = "center";
                    return;
                }

                data.forEach(pos => {
                    const row = tableBody.insertRow();

                    // Helper to format currency
                    const fmtMoney = (val) => {
                        if (val === undefined || val === null || val === '-') return '-';
                        return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(val);
                    };

                    const fmtPct = (val) => {
                        if (val === undefined || val === null || val === '-') return '-';
                        return (val).toFixed(2) + '%';
                    };

                    const symbol = pos.symbol;
                    const qty = pos.quantity;
                    const cost_basis = pos.cost_basis;
                    const current_price = pos.current_price;

                    let market_value = '-';
                    let pnl = '-';
                    let pnl_pct = '-';

                    if (current_price && qty) {
                        market_value = current_price * qty;
                        // If short, cost basis is proceeds (positive), so we track liability.
                        // Usually cost_basis from Tradier is negative for debit?
                        // Let's assume standard Long: PnL = (Price - Cost) * Qty
                        // Tradier 'cost_basis' is total cost? Or per share?
                        // Documentation says: cost_basis is TOTAL cost of position.
                        // So PnL = Market Value - Cost Basis.

                        pnl = market_value - cost_basis;
                        if (cost_basis !== 0) {
                            pnl_pct = (pnl / Math.abs(cost_basis)) * 100;
                        }
                    }

                    // Styling for PnL
                    const pnlColor = pnl > 0 ? 'var(--md-sys-color-primary)' : (pnl < 0 ? 'var(--md-sys-color-error, #ffb4ab)' : 'inherit');

                    row.innerHTML = `
                    <td>${symbol}</td>
                    <td>${qty}</td>
                    <td>${fmtMoney(cost_basis)}</td>
                    <td>${fmtMoney(current_price)}</td>
                    <td>${fmtMoney(market_value)}</td>
                    <td style="color: ${pnlColor}">${fmtMoney(pnl)}</td>
                    <td style="color: ${pnlColor}">${fmtPct(pnl_pct)}</td>
                `;
                });
            })
            .catch(error => {
                loading.classList.add('hidden');
                console.error('Error:', error);
                document.getElementById('positions-error').textContent = 'Error loading positions.';
                document.getElementById('positions-error').classList.remove('hidden');
            });
    }
</script>
{% endblock %}
