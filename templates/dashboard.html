{% extends "base.html" %}

{% block main_class %}space-y-6{% endblock %}

{% block content %}

<!-- Overview Widget Row -->
<div class="grid grid-cols-1 md:grid-cols-4 gap-4">
    <div class="p-6 bg-white rounded-lg border border-gray-200 shadow-sm dark:bg-gray-800 dark:border-gray-700">
        <h3 class="mb-2 text-sm font-medium text-gray-500 dark:text-gray-400 uppercase tracking-widest">Total Equity
        </h3>
        <p id="acc-total-equity" class="text-3xl font-bold text-gray-900 dark:text-white">-</p>
    </div>
    <div class="p-6 bg-white rounded-lg border border-gray-200 shadow-sm dark:bg-gray-800 dark:border-gray-700">
        <h3 class="mb-2 text-sm font-medium text-gray-500 dark:text-gray-400 uppercase tracking-widest">Option BP</h3>
        <p id="acc-option-bp" class="text-3xl font-bold text-gray-900 dark:text-white">-</p>
    </div>
    <div class="p-6 bg-white rounded-lg border border-gray-200 shadow-sm dark:bg-gray-800 dark:border-gray-700">
        <h3 class="mb-2 text-sm font-medium text-gray-500 dark:text-gray-400 uppercase tracking-widest">Stock BP</h3>
        <p id="acc-stock-bp" class="text-3xl font-bold text-gray-900 dark:text-white">-</p>
    </div>
    <div class="p-6 bg-white rounded-lg border border-gray-200 shadow-sm dark:bg-gray-800 dark:border-gray-700">
        <h3 class="mb-2 text-sm font-medium text-gray-500 dark:text-gray-400 uppercase tracking-widest">Market Sentiment
            (VIX)</h3>
        <p id="mkt-sentiment-val" class="text-3xl font-bold text-gray-900 dark:text-white">-</p>
        <div id="mkt-sentiment-text" class="text-sm font-medium mt-1">-</div>
    </div>
</div>

<!-- Chart & Positions Row -->
<div class="flex flex-col gap-6">

    <!-- Mini Equity/VIX Chart Placeholder -->
    <div
        class="p-6 bg-white rounded-lg border border-gray-200 shadow-sm dark:bg-gray-800 dark:border-gray-700 w-full flex flex-col">
        <h2 class="text-lg font-semibold text-gray-900 dark:text-white mb-4">Market Overview</h2>
        <div id="mini-tv-chart"
            class="w-full flex-grow min-h-[300px] bg-gray-50 dark:bg-gray-900 rounded border border-gray-100 dark:border-gray-700">
        </div>
    </div>

    <!-- Open Positions Table -->
    <div class="p-6 bg-white rounded-lg border border-gray-200 shadow-sm dark:bg-gray-800 dark:border-gray-700 w-full">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-semibold text-gray-900 dark:text-white">Open Positions</h2>
            <div id="loading-positions" class="text-sm text-gray-500 dark:text-gray-400 hidden">Loading data...</div>
            <div id="positions-error" class="text-sm text-red-600 dark:text-red-500 hidden"></div>
        </div>

        <div class="relative overflow-x-auto rounded-lg">
            <table id="positions-table"
                class="w-full text-sm text-left rtl:text-right text-gray-500 dark:text-gray-400">
                <thead class="text-xs text-gray-700 uppercase bg-gray-50 dark:bg-gray-700 dark:text-gray-400">
                    <tr>
                        <th scope="col" class="px-6 py-3">Symbol</th>
                        <th scope="col" class="px-6 py-3 text-right">Qty</th>
                        <th scope="col" class="px-6 py-3 text-right">Cost Basis</th>
                        <th scope="col" class="px-6 py-3 text-right">Current Price</th>
                        <th scope="col" class="px-6 py-3 text-right">Market Value</th>
                        <th scope="col" class="px-6 py-3 text-right">PnL</th>
                        <th scope="col" class="px-6 py-3 text-right">PnL %</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Populated by JS -->
                </tbody>
            </table>
        </div>
    </div>

</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        loadAccountData();
        loadPositions();
        loadMarketSentiment();
        initMiniChart();

        setInterval(() => {
            checkMarketStatus();
            loadMarketSentiment();
        }, 30000);
    });

    function initMiniChart() {
        const chartContainer = document.getElementById('mini-tv-chart');
        if (!chartContainer || typeof LightweightCharts === 'undefined') return;

        const chart = LightweightCharts.createChart(chartContainer, {
            layout: {
                background: { type: 'solid', color: 'transparent' },
                textColor: document.documentElement.classList.contains('dark') ? '#9ca3af' : '#4b5563',
            },
            grid: {
                vertLines: { color: document.documentElement.classList.contains('dark') ? '#374151' : '#f3f4f6' },
                horzLines: { color: document.documentElement.classList.contains('dark') ? '#374151' : '#f3f4f6' },
            },
            rightPriceScale: {
                borderVisible: false,
            },
            timeScale: {
                borderVisible: false,
            },
        });

        const lineSeries = chart.addLineSeries({
            color: '#3b82f6',
            lineWidth: 2,
        });

        // Placeholder data for the visual
        const data = [];
        let cur = 100;
        const now = Math.floor(Date.now() / 1000);
        for (let i = 30; i >= 0; i--) {
            data.push({ time: now - (i * 86400), value: cur });
            cur += (Math.random() - 0.4) * 2;
        }
        lineSeries.setData(data);
        chart.timeScale().fitContent();

        // Handle resize layout
        new ResizeObserver(entries => {
            if (entries.length === 0 || entries[0].target !== chartContainer) { return; }
            const newRect = entries[0].contentRect;
            chart.applyOptions({ height: newRect.height, width: newRect.width });
        }).observe(chartContainer);
    }

    function checkMarketStatus() {
        fetch('/api/market/status')
            .then(response => response.json())
            .then(data => {
                if (data.clock && data.clock.state === 'open') {
                    loadAccountData();
                    loadPositions();
                }
            })
            .catch(err => console.error("Error checking market status:", err));
    }

    function loadAccountData() {
        fetch('/api/account')
            .then(response => response.json())
            .then(data => {
                if (data.error) return;
                const fmtMoney = (val) => val != null ? new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(val) : '-';
                document.getElementById('acc-total-equity').textContent = fmtMoney(data.total_equity);
                document.getElementById('acc-option-bp').textContent = fmtMoney(data.option_buying_power);
                document.getElementById('acc-stock-bp').textContent = fmtMoney(data.stock_buying_power);
            })
            .catch(err => console.error("Error loading account data:", err));
    }

    function loadMarketSentiment() {
        fetch('/api/market/sentiment')
            .then(res => res.json())
            .then(data => {
                const el = document.getElementById('mkt-sentiment-val');
                const textEl = document.getElementById('mkt-sentiment-text');

                if (data.error) {
                    el.textContent = "Error"; textEl.textContent = "-"; return;
                }

                let pctHtml = '';
                if (data.change_percent !== undefined) {
                    const pct = parseFloat(data.change_percent);
                    const colorClass = pct >= 0 ? 'text-green-500' : 'text-red-500';
                    const sign = pct >= 0 ? '+' : '';
                    pctHtml = `<span class="${colorClass} text-sm ml-2 font-medium">(${sign}${pct.toFixed(2)}%)</span>`;
                }

                el.innerHTML = `${data.value || '-'} ${pctHtml}`;
                textEl.textContent = data.sentiment;

                // Tailwind dynamic color classes based on VIX levels
                textEl.className = `text-sm font-medium mt-1 ${data.sentiment === 'Extreme Fear' ? 'text-red-500' : (data.sentiment === 'Greed' ? 'text-green-500' : 'text-yellow-500')}`;
            })
            .catch(err => console.error("VIX Error:", err));
    }

    function loadPositions() {
        const tableBody = document.querySelector('#positions-table tbody');
        const loading = document.getElementById('loading-positions');

        loading.classList.remove('hidden');

        fetch('/api/positions')
            .then(response => response.json())
            .then(data => {
                loading.classList.add('hidden');
                tableBody.innerHTML = '';

                if (!data || data.length === 0) {
                    tableBody.innerHTML = `<tr><td colspan="7" class="px-6 py-8 text-center text-gray-500">No open positions found.</td></tr>`;
                    return;
                }

                data.forEach(pos => {
                    const fmtMoney = (val) => val != null ? new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(val) : '-';
                    const fmtPct = (val) => val != null ? val.toFixed(2) + '%' : '-';

                    const isOption = pos.expiration_date !== undefined;
                    let displaySymbol = `
                        <div class="font-semibold text-gray-900 dark:text-white">${pos.symbol}</div>
                    `;
                    if (isOption) {
                        displaySymbol = `
                            <div class="font-semibold text-gray-900 dark:text-white">${pos.underlying || pos.symbol}</div>
                            <div class="text-xs text-gray-500">${pos.option_type === 'call' ? 'C' : 'P'} ${pos.strike} ${pos.expiration_date}</div>
                        `;
                    }

                    let market_value = '-';
                    let pnl = '-';
                    let pnl_pct = '-';

                    if (pos.current_price && pos.quantity) {
                        market_value = pos.current_price * pos.quantity * (isOption ? 100 : 1);
                        pnl = market_value - pos.cost_basis;
                        if (pos.cost_basis !== 0) pnl_pct = (pnl / Math.abs(pos.cost_basis)) * 100;
                    }

                    const pnlColorClass = pnl > 0 ? 'text-green-500' : (pnl < 0 ? 'text-red-500' : 'text-gray-900 dark:text-white');

                    const row = document.createElement('tr');
                    row.className = "bg-white border-b dark:bg-gray-800 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-600";
                    row.innerHTML = `
                        <td class="px-6 py-4">${displaySymbol}</td>
                        <td class="px-6 py-4 text-right font-medium text-gray-900 dark:text-white">${pos.quantity}</td>
                        <td class="px-6 py-4 text-right">${fmtMoney(pos.cost_basis)}</td>
                        <td class="px-6 py-4 text-right">${fmtMoney(pos.current_price)}</td>
                        <td class="px-6 py-4 text-right font-medium text-gray-900 dark:text-white">${fmtMoney(market_value)}</td>
                        <td class="px-6 py-4 text-right font-bold ${pnlColorClass}">${fmtMoney(pnl)}</td>
                        <td class="px-6 py-4 text-right font-bold ${pnlColorClass}">${fmtPct(pnl_pct)}</td>
                    `;
                    tableBody.appendChild(row);
                });
            })
            .catch(error => {
                loading.classList.add('hidden');
                document.getElementById('positions-error').textContent = 'Error loading positions.';
                document.getElementById('positions-error').classList.remove('hidden');
            });
    }
</script>
{% endblock %}
