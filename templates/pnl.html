{% extends "base.html" %}

{% block title %}P&L Tracker{% endblock %}

{% block main_class %}space-y-6{% endblock %}

{% block content %}
<!-- Top Row: P&L Tracker Control Panel & Total P&L -->
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

    <!-- 1. P&L Tracker Control Panel -->
    <div
        class="p-6 bg-white rounded-lg border border-gray-200 shadow-sm dark:bg-gray-800 dark:border-gray-700 flex flex-col justify-center items-center text-center h-full">
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white mb-4">P&L Tracker</h1>
        <button id="sync-btn"
            class="text-white bg-primary-700 hover:bg-primary-800 focus:ring-4 focus:ring-primary-300 font-medium rounded-lg text-sm px-5 py-2.5 flex items-center dark:bg-primary-600 dark:hover:bg-primary-700 focus:outline-none dark:focus:ring-primary-800 transition-colors">
            <span class="material-symbols-outlined text-[18px] mr-2">sync</span>
            Sync
        </button>
    </div>

    <!-- 2. Total P&L -->
    <div
        class="p-6 bg-white rounded-lg border border-gray-200 shadow-sm dark:bg-gray-800 dark:border-gray-700 flex flex-col justify-center items-center text-center h-full">
        <h2 class="text-sm font-medium text-gray-500 uppercase tracking-widest dark:text-gray-400 m-0">Total Closed P&L
        </h2>
        <div id="total-pnl" class="text-4xl font-bold mt-2 text-gray-900 dark:text-white">$0.00</div>
    </div>
</div>

<!-- Charts Row (History) -->
<div class="p-6 bg-white rounded-lg border border-gray-200 shadow-sm dark:bg-gray-800 dark:border-gray-700">
    <h2 class="text-xl font-bold text-gray-900 dark:text-white mb-4">Realized P&L History</h2>
    <!-- TradingView Chart Container -->
    <div id="pnlHistoryChart" class="w-full h-[400px]"></div>
</div>

<!-- Positions Section -->
<div class="p-6 bg-white rounded-lg border border-gray-200 shadow-sm dark:bg-gray-800 dark:border-gray-700">
    <div class="flex justify-between items-center mb-4">
        <h2 class="text-xl font-bold text-gray-900 dark:text-white" id="table-title">Closed Positions</h2>
    </div>

    <div class="relative overflow-x-auto rounded-lg">
        <table id="positions-table" class="w-full text-sm text-left text-gray-500 dark:text-gray-400">
            <thead id="table-head"
                class="text-xs text-gray-700 uppercase bg-gray-50 dark:bg-gray-700 dark:text-gray-400">
                <!-- Headers injected via JS -->
            </thead>
            <tbody id="table-body">
                <tr>
                    <td colspan="10" class="px-6 py-8 text-center text-gray-500">Loading...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
    let pnlChart = null;
    let pnlSeries = null;

    document.addEventListener('DOMContentLoaded', () => {
        const syncBtn = document.getElementById('sync-btn');
        let rawData = { open: [], closed: [] };

        async function loadPnL() {
            try {
                const res = await fetch(`/api/pnl?t=${Date.now()}`);
                const data = await res.json();

                if (data.error) {
                    console.error("API Error:", data.error);
                    return;
                }

                rawData = data.pnl_data;
                renderApp();

            } catch (err) {
                console.error("Load PnL Error:", err);
                const tbody = document.getElementById('table-body');
                if (tbody) tbody.innerHTML = `<tr><td colspan="10" class="text-center text-red-500 px-6 py-4">Error loading data: ${err.message}</td></tr>`;
            }
        }

        function renderApp() {
            renderTable();
            updateSummary(0, rawData.closed);
            renderCharts(rawData.closed);
        }

        function renderTable() {
            const tbody = document.getElementById('table-body');
            const thead = document.getElementById('table-head');
            if (!tbody || !thead) return;

            tbody.innerHTML = '';
            thead.innerHTML = '';

            const list = rawData.closed;

            if (list) {
                list.sort((a, b) => {
                    const dateA = new Date(a.exit_date || a.last_updated || 0);
                    const dateB = new Date(b.exit_date || b.last_updated || 0);
                    return dateB - dateA;
                });
            }

            if (!list || list.length === 0) {
                thead.innerHTML = `<tr><th class="px-6 py-3">Status</th></tr>`;
                tbody.innerHTML = `<tr><td class="px-6 py-8 text-center" colspan="9">No closed positions found.</td></tr>`;
                return;
            }

            let columns = [
                { header: 'Symbol', key: 'symbol' },
                { header: 'Qty', key: 'quantity' },
                { header: 'Entry', key: 'entry_price', format: 'currency' },
                { header: 'Exit Price', key: 'exit_price', format: 'currency' },
                { header: 'Cost Basis', key: 'cost_basis', format: 'currency' },
                { header: 'Realized P&L', key: 'pnl', format: 'currency', color: true },
                { header: 'Return %', key: 'pnl_pct', format: 'pct', color: true },
                { header: 'Exit Date', key: 'exit_date', format: 'date' }
            ];

            const headerRow = document.createElement('tr');
            columns.forEach(col => {
                const th = document.createElement('th');
                th.className = `px-6 py-3 font-medium text-gray-900 dark:text-white ${['quantity', 'entry_price', 'exit_price', 'cost_basis', 'pnl', 'pnl_pct'].includes(col.key) ? 'text-right' : ''}`;
                th.textContent = col.header;
                headerRow.appendChild(th);
            });
            thead.appendChild(headerRow);

            list.forEach(p => {
                const tr = document.createElement('tr');
                tr.className = "bg-white border-b dark:bg-gray-800 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-600";

                columns.forEach(col => {
                    const td = document.createElement('td');
                    let val = p[col.key];

                    if (col.format === 'currency') val = formatCurrency(val);
                    if (col.format === 'pct') val = formatPct(val);
                    if (col.format === 'date') val = formatDate(val);

                    td.className = "px-6 py-4 whitespace-nowrap";

                    if (['quantity', 'entry_price', 'exit_price', 'cost_basis', 'pnl', 'pnl_pct'].includes(col.key)) {
                        td.classList.add('text-right');
                    }

                    if (col.key === 'symbol') {
                        td.classList.add('font-semibold', 'text-gray-900', 'dark:text-white');
                    } else if (col.color) {
                        const num = parseFloat(p[col.key]);
                        if (num > 0) td.classList.add('text-green-500', 'font-bold');
                        else if (num < 0) td.classList.add('text-red-500', 'font-bold');
                        else td.classList.add('text-gray-900', 'dark:text-gray-300');
                    }

                    td.textContent = val;
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            });
        }

        function formatCurrency(num) {
            if (num === undefined || num === null || num === '') return '-';
            return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(num);
        }

        function formatPct(num) {
            if (num === undefined || num === null) return '-';
            return num.toFixed(2) + '%';
        }

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            return new Date(dateStr).toLocaleDateString() + ' ' + new Date(dateStr).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        if (syncBtn) {
            syncBtn.addEventListener('click', async () => {
                syncBtn.disabled = true;
                const origHtml = syncBtn.innerHTML;
                syncBtn.innerHTML = '<span class="material-symbols-outlined text-[18px] mr-2 animate-spin">refresh</span> Syncing...';
                try {
                    const res = await fetch('/api/bot/sync_positions', { method: 'POST' });
                    const data = await res.json();
                    if (data.status === 'success') {
                        loadPnL();
                    } else {
                        alert("Sync Failed: " + (data.error || 'Unknown error'));
                    }
                } catch (err) {
                    console.error(err);
                    alert("Network Error");
                } finally {
                    syncBtn.disabled = false;
                    syncBtn.innerHTML = origHtml;
                }
            });
        }

        loadPnL();

        function renderCharts(closedPos) {
            const chartContainer = document.getElementById('pnlHistoryChart');
            if (!chartContainer) return;
            if (typeof LightweightCharts === 'undefined') {
                console.error("LightweightCharts is not loaded. Ensure the CDN script is included.");
                chartContainer.innerHTML = '<div class="text-red-500 flex items-center justify-center w-full h-full">Error loading charting library.</div>';
                return;
            }

            if (pnlChart) {
                pnlChart.remove();
                pnlChart = null;
            }

            pnlChart = LightweightCharts.createChart(chartContainer, {
                layout: {
                    background: { type: 'solid', color: 'transparent' },
                    textColor: document.documentElement.classList.contains('dark') ? '#9ca3af' : '#4b5563',
                },
                grid: {
                    vertLines: { color: document.documentElement.classList.contains('dark') ? '#374151' : '#f3f4f6' },
                    horzLines: { color: document.documentElement.classList.contains('dark') ? '#374151' : '#f3f4f6' },
                },
                rightPriceScale: {
                    borderVisible: false,
                    scaleMargins: {
                        top: 0.1,
                        bottom: 0.1,
                    },
                },
                timeScale: {
                    borderVisible: false,
                    timeVisible: true,
                },
            });

            pnlSeries = pnlChart.addAreaSeries({
                lineColor: '#3b82f6',
                topColor: 'rgba(59, 130, 246, 0.4)',
                bottomColor: 'rgba(59, 130, 246, 0.0)',
                lineWidth: 2,
            });

            const sortedClosed = (closedPos || []).sort((a, b) => new Date(a.exit_date) - new Date(b.exit_date));
            const chartData = [];
            let runningTotal = 0;

            sortedClosed.forEach(p => {
                if (p.exit_date) {
                    runningTotal += (p.pnl || 0);
                    const timestamp = Math.floor(new Date(p.exit_date).getTime() / 1000);

                    if (chartData.length > 0 && chartData[chartData.length - 1].time === timestamp) {
                        chartData[chartData.length - 1].value = runningTotal;
                    } else {
                        chartData.push({ time: timestamp, value: runningTotal });
                    }
                }
            });

            if (chartData.length > 0) {
                pnlSeries.setData(chartData);
                pnlChart.timeScale().fitContent();
            }

            new ResizeObserver(entries => {
                if (entries.length === 0 || entries[0].target !== chartContainer) { return; }
                const newRect = entries[0].contentRect;
                pnlChart.applyOptions({ height: newRect.height, width: newRect.width });
            }).observe(chartContainer);
        }

        function updateSummary(openPos, closedPos) {
            const openPnL = (openPos || []).reduce((acc, p) => acc + (p.pnl || 0), 0);
            const closedPnL = (closedPos || []).reduce((acc, p) => acc + (p.pnl || 0), 0);
            const totalPnL = openPnL + closedPnL;

            const pnlEl = document.getElementById('total-pnl');
            if (pnlEl) {
                pnlEl.innerText = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(totalPnL);
                pnlEl.className = `text-4xl font-bold mt-2 ${totalPnL >= 0 ? 'text-green-500' : 'text-red-500'}`;
            }
        }
    });
</script>
{% endblock %}
