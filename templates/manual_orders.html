{% extends "base.html" %}

{% block main_class %}full-width-layout{% endblock %}

{% block content %}
<div class="md-grid" style="grid-template-columns: repeat(12, 1fr); gap: 24px; max-width: 800px; margin: 0 auto;">

    <!-- Order Form Card -->
    <div class="md-card col-span-12">
        <h2 class="md-card__headline">Manual Order Entry</h2>

        <form id="order-form" style="margin-top: 16px;">

            <!-- Class Selection -->
            <div style="margin-bottom: 24px;">
                <label class="md-text-field-label" style="position:static; display:block; margin-bottom:8px;">Asset
                    Class</label>
                <div class="md-segmented-button">
                    <button type="button" class="md-button md-button--filled class-btn" data-value="equity">Equity
                        (Stock)</button>
                    <button type="button" class="md-button md-button--tonal class-btn"
                        data-value="option">Option</button>
                </div>
                <input type="hidden" id="order_class" value="equity">
            </div>

            <!-- Strategy Selection (Hidden for Equity) -->
            <div id="strategy-container" class="hidden" style="margin-bottom: 24px;">
                <label class="md-text-field-label"
                    style="position:static; display:block; margin-bottom:8px;">Strategy</label>
                <div class="md-segmented-button">
                    <button type="button" class="md-button md-button--filled strategy-btn"
                        data-value="single">Single</button>
                    <button type="button" class="md-button md-button--tonal strategy-btn"
                        data-value="credit_spread">Credit Spread</button>
                    <button type="button" class="md-button md-button--tonal strategy-btn" data-value="iron_condor">Iron
                        Condor</button>
                </div>
                <input type="hidden" id="strategy" value="single">
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">

                <!-- Symbol -->
                <div class="md-text-field-container">
                    <input type="text" id="symbol" class="md-text-field" placeholder="Symbol (e.g. TSLA)" required>
                    <label class="md-text-field-label">Underlying Symbol</label>
                </div>

                <!-- Price Display -->
                <div class="md-text-field-container">
                    <input type="text" id="current-price" class="md-text-field" placeholder="-" disabled
                        style="color:white;">
                    <label class="md-text-field-label">Current Price</label>
                </div>
            </div>

            <!-- Option Chain Section -->
            <div id="option-chain-container" class="hidden" style="margin-top:16px;">

                <!-- Expiration -->
                <div class="md-text-field-container" style="margin-bottom:16px;">
                    <select id="expiration" class="md-text-field" style="background:transparent; color:white;">
                        <option value="" disabled selected>Select Expiration</option>
                    </select>
                    <label class="md-text-field-label">Expiration</label>
                </div>

                <!-- SINGLE / CREDIT SPREAD: Type Selector -->
                <div id="type-selector-container" class="md-text-field-container" style="margin-bottom:16px;">
                    <select id="option_type" class="md-text-field" style="background:transparent; color:white;"
                        disabled>
                        <option value="" disabled selected>Select Type</option>
                        <option value="call" style="color:black;">Call</option>
                        <option value="put" style="color:black;">Put</option>
                    </select>
                    <label class="md-text-field-label">Option Type</label>
                </div>

                <!-- SINGLE / CREDIT SPREAD: Strike Selector -->
                <div id="strike-selector-container" class="md-text-field-container" style="margin-bottom:16px;">
                    <select id="option_strike" class="md-text-field" style="background:transparent; color:white;"
                        disabled>
                        <option value="" disabled selected>Select Strike</option>
                    </select>
                    <label id="lbl-strike-select" class="md-text-field-label">Strike</label>
                </div>

                <!-- IRON CONDOR: Put Strike & Call Strike -->
                <div id="condor-inputs" class="hidden"
                    style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom:16px;">
                    <div class="md-text-field-container">
                        <select id="short_put_strike" class="md-text-field" style="background:transparent; color:white;"
                            disabled>
                            <option value="" disabled selected>Short Put</option>
                        </select>
                        <label class="md-text-field-label">Short Put</label>
                    </div>
                    <div class="md-text-field-container">
                        <select id="short_call_strike" class="md-text-field"
                            style="background:transparent; color:white;" disabled>
                            <option value="" disabled selected>Short Call</option>
                        </select>
                        <label class="md-text-field-label">Short Call</label>
                    </div>
                </div>

                <!-- Multileg Legs Display -->
                <div id="legs-display" class="hidden"
                    style="padding: 12px; background: rgba(255,255,255,0.05); border-radius: 8px; margin-bottom: 16px;">
                    <div style="font-size: 0.9em; opacity: 0.8; margin-bottom: 8px;">Selected Legs:</div>
                    <div id="legs-list" style="font-family: monospace;"></div>
                </div>

                <!-- Hidden Option Symbol (Single) -->
                <input type="hidden" id="option_symbol">
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px;">
                <!-- Side -->
                <div class="md-text-field-container">
                    <select id="side" class="md-text-field" style="background:transparent; color:white;">
                        <!-- Dynamic Options -->
                    </select>
                    <label class="md-text-field-label">Side</label>
                </div>

                <!-- Quantity -->
                <div class="md-text-field-container">
                    <input type="number" id="quantity" class="md-text-field" placeholder="Quantity" min="1" value="1"
                        required>
                    <label class="md-text-field-label">Quantity</label>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px;">
                <!-- Type -->
                <div class="md-text-field-container">
                    <select id="type" class="md-text-field" style="background:transparent; color:white;">
                        <option value="market" style="color:black;">Market</option>
                        <option value="limit" style="color:black;">Limit</option>
                        <option value="stop" style="color:black;">Stop</option>
                        <option value="stop_limit" style="color:black;">Stop Limit</option>
                    </select>
                    <label class="md-text-field-label">Order Type</label>
                </div>

                <!-- Duration -->
                <div class="md-text-field-container">
                    <select id="duration" class="md-text-field" style="background:transparent; color:white;">
                        <option value="day" style="color:black;">Day</option>
                        <option value="gtc" style="color:black;">GTC</option>
                        <option value="pre" style="color:black;">Pre-Market</option>
                        <option value="post" style="color:black;">Post-Market</option>
                    </select>
                    <label class="md-text-field-label">Duration</label>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px;">
                <!-- Price (Hidden for Market) -->
                <div class="md-text-field-container hidden" id="price-container">
                    <input type="number" id="price" class="md-text-field" placeholder="Limit Price" step="0.01">
                    <label class="md-text-field-label">Limit Price</label>
                </div>

                <!-- Stop Price (Hidden for non-Stop) -->
                <div class="md-text-field-container hidden" id="stop-container">
                    <input type="number" id="stop" class="md-text-field" placeholder="Stop Price" step="0.01">
                    <label class="md-text-field-label">Stop Price</label>
                </div>
            </div>

            <!-- Submit -->
            <div style="margin-top: 24px; text-align: right;">
                <div id="status-message" style="margin-bottom: 16px; font-weight: 500;"></div>
                <button type="submit" id="btn-submit" class="md-button md-button--filled"
                    style="width: 100%; padding: 12px;">Place Order</button>
            </div>

        </form>
    </div>

</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const orderForm = document.getElementById('order-form');
        const orderClassInput = document.getElementById('order_class');
        const strategyInput = document.getElementById('strategy');

        const classBtns = document.querySelectorAll('.class-btn');
        const strategyBtns = document.querySelectorAll('.strategy-btn');

        const symbolInput = document.getElementById('symbol');
        const currentPriceInput = document.getElementById('current-price');

        const optionChainContainer = document.getElementById('option-chain-container');
        const strategyContainer = document.getElementById('strategy-container');

        const expirationSelect = document.getElementById('expiration');
        const optionTypeSelect = document.getElementById('option_type');
        const optionStrikeSelect = document.getElementById('option_strike');
        const lblStrikeSelect = document.getElementById('lbl-strike-select');
        const optionSymbolInput = document.getElementById('option_symbol'); // used for single

        // Strategy Specific
        const typeSelectorContainer = document.getElementById('type-selector-container');
        const strikeSelectorContainer = document.getElementById('strike-selector-container');
        const condorInputs = document.getElementById('condor-inputs');
        const shortPutSelect = document.getElementById('short_put_strike');
        const shortCallSelect = document.getElementById('short_call_strike');
        const legsDisplay = document.getElementById('legs-display');
        const legsList = document.getElementById('legs-list');

        const sideSelect = document.getElementById('side');
        const typeSelect = document.getElementById('type');
        const priceContainer = document.getElementById('price-container');
        const stopContainer = document.getElementById('stop-container');

        const statusMessage = document.getElementById('status-message');
        const btnSubmit = document.getElementById('btn-submit');

        let currentChain = [];
        let currentPrice = 0;
        let spreadWidth = 1;

        // Side Definitions
        const equitySides = [
            { value: 'buy', text: 'Buy' },
            { value: 'sell', text: 'Sell' },
            { value: 'buy_to_cover', text: 'Buy to Cover' },
            { value: 'sell_short', text: 'Sell Short' }
        ];

        const optionSides = [
            { value: 'buy_to_open', text: 'Buy to Open' },
            { value: 'buy_to_close', text: 'Buy to Close' },
            { value: 'sell_to_open', text: 'Sell to Open' },
            { value: 'sell_to_close', text: 'Sell to Close' }
        ];

        // Strategy Rendering Logic
        const renderUI = () => {
            const assetClass = orderClassInput.value;
            const strategy = strategyInput.value;

            // Asset Class Toggle
            classBtns.forEach(b => {
                const isActive = b.dataset.value === assetClass;
                b.className = `md-button class-btn ${isActive ? 'md-button--filled' : 'md-button--tonal'}`;
            });

            if (assetClass === 'option') {
                optionChainContainer.classList.remove('hidden');
                strategyContainer.classList.remove('hidden');

                // Strategy Toggle
                strategyBtns.forEach(b => {
                    const isActive = b.dataset.value === strategy;
                    b.className = `md-button strategy-btn ${isActive ? 'md-button--filled' : 'md-button--tonal'}`;
                });

                // Inputs Visibility based on Strategy
                if (strategy === 'iron_condor') {
                    typeSelectorContainer.classList.add('hidden');
                    strikeSelectorContainer.classList.add('hidden');
                    condorInputs.classList.remove('hidden');
                    legsDisplay.classList.remove('hidden');
                } else if (strategy === 'credit_spread') {
                    typeSelectorContainer.classList.remove('hidden');
                    strikeSelectorContainer.classList.remove('hidden');
                    condorInputs.classList.add('hidden');
                    lblStrikeSelect.textContent = "Short Strike";
                    legsDisplay.classList.remove('hidden');
                } else {
                    // Single
                    typeSelectorContainer.classList.remove('hidden');
                    strikeSelectorContainer.classList.remove('hidden');
                    condorInputs.classList.add('hidden');
                    lblStrikeSelect.textContent = "Strike";
                    legsDisplay.classList.add('hidden');
                }

            } else {
                optionChainContainer.classList.add('hidden');
                strategyContainer.classList.add('hidden');
            }

            updateSideOptions(assetClass);
        };

        const updateSideOptions = (assetClass) => {
            const sides = assetClass === 'option' ? optionSides : equitySides;
            sideSelect.innerHTML = '';
            sides.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s.value;
                opt.textContent = s.text;
                opt.style.color = 'black';
                sideSelect.appendChild(opt);
            });
            // Default to Sell to Open for Spreads/Condors if convenient?
            const strategy = strategyInput.value;
            if (assetClass === 'option' && (strategy === 'credit_spread' || strategy === 'iron_condor')) {
                sideSelect.value = 'sell_to_open';
            }
        };

        // Fetch Quote Logic
        const fetchQuote = async () => {
            const sym = symbolInput.value.toUpperCase();
            if (!sym) return;

            try {
                const res = await fetch(`/api/quotes?symbol=${sym}`);
                const data = await res.json();
                if (data.quote) {
                    currentPrice = data.quote.last || data.quote.ask; // Fallback
                    currentPriceInput.value = `$${currentPrice}`;
                    spreadWidth = currentPrice > 100 ? 5 : 1;
                }
            } catch (e) {
                console.error("Quote error", e);
            }
        };

        const fetchExpirations = async () => {
            const sym = symbolInput.value.toUpperCase();
            if (orderClassInput.value !== 'option' || !sym) return;

            expirationSelect.innerHTML = '<option value="" disabled selected>Loading...</option>';
            expirationSelect.disabled = true;

            try {
                const res = await fetch(`/api/options/expirations?symbol=${sym}`);
                const data = await res.json();

                if (data.error) throw new Error(data.error);

                expirationSelect.innerHTML = '<option value="" disabled selected>Select Expiration</option>';
                data.expirations.forEach(date => {
                    const opt = document.createElement('option');
                    opt.value = date;
                    opt.style.color = 'black';
                    opt.textContent = date;
                    expirationSelect.appendChild(opt);
                });
                expirationSelect.disabled = false;

            } catch (e) {
                console.error(e);
                expirationSelect.innerHTML = '<option value="" disabled selected>Error loading expirations</option>';
            }
        };

        // Listeners
        classBtns.forEach(btn => btn.addEventListener('click', () => {
            orderClassInput.value = btn.dataset.value;
            if (orderClassInput.value === 'option') {
                fetchQuote();
                fetchExpirations();
            }
            renderUI();
        }));

        strategyBtns.forEach(btn => btn.addEventListener('click', () => {
            strategyInput.value = btn.dataset.value;
            renderUI();
            // Trigger recalculation of legs if needed
            calculateLegs();
        }));

        symbolInput.addEventListener('blur', () => {
            fetchQuote();
            fetchExpirations();
        });

        symbolInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                symbolInput.blur();
            }
        });

        expirationSelect.addEventListener('change', async () => {
            const sym = symbolInput.value.toUpperCase();
            const date = expirationSelect.value;

            // Reset UI
            optionTypeSelect.value = "";
            optionStrikeSelect.innerHTML = '<option value="" disabled selected>Loading...</option>';
            shortPutSelect.innerHTML = '<option value="" disabled selected>Loading...</option>';
            shortCallSelect.innerHTML = '<option value="" disabled selected>Loading...</option>';

            try {
                const res = await fetch(`/api/options/chain?symbol=${sym}&expiration=${date}`);
                const data = await res.json();
                currentChain = data.chain || [];

                // Enable selectors
                optionTypeSelect.disabled = false;
                optionStrikeSelect.innerHTML = '<option value="" disabled selected>Select Option Type First</option>';
                optionStrikeSelect.disabled = true;

                // Populate Condor selectors immediately (Put and Call separate lists)
                if (strategyInput.value === 'iron_condor') {
                    populateStrikeSelector(shortPutSelect, 'put');
                    populateStrikeSelector(shortCallSelect, 'call');
                    shortPutSelect.disabled = false;
                    shortCallSelect.disabled = false;
                }

            } catch (e) {
                console.error(e);
                alert('Error fetching chain: ' + e.message);
            }
        });

        optionTypeSelect.addEventListener('change', () => {
            const type = optionTypeSelect.value;
            // Populate strikes
            populateStrikeSelector(optionStrikeSelect, type);
            optionStrikeSelect.disabled = false;
            calculateLegs();
        });

        optionStrikeSelect.addEventListener('change', calculateLegs);
        shortPutSelect.addEventListener('change', calculateLegs);
        shortCallSelect.addEventListener('change', calculateLegs);

        // Helper to populate strikes
        const populateStrikeSelector = (selectEl, type) => {
            selectEl.innerHTML = `<option value="" disabled selected>Select ${type === 'call' ? 'Call' : 'Put'}</option>`;
            if (!currentChain.length) return;

            const filtered = currentChain.filter(o => o.option_type === type).sort((a, b) => a.strike - b.strike);

            filtered.forEach(opt => {
                const el = document.createElement('option');
                el.value = opt.symbol;
                el.dataset.strike = opt.strike;
                el.dataset.price = opt.last || opt.bid || 0;
                el.style.color = 'black';

                let delta = opt.greeks?.delta || opt.delta || 0;
                delta = Number(delta).toFixed(2);

                el.textContent = `${opt.strike} ($${el.dataset.price}) Δ ${delta}`;
                selectEl.appendChild(el);
            });
        };

        // Single option helper
        optionStrikeSelect.addEventListener('change', () => {
            optionSymbolInput.value = optionStrikeSelect.value;
        });

        // Core Leg Calculation
        function calculateLegs() {
            const strategy = strategyInput.value;
            const side = sideSelect.value; // 'sell_to_open' etc
            legsList.innerHTML = '';

            if (strategy === 'single') return; // Handled by simple form

            if (!currentChain.length) return;

            // Determine if we are Opening (Credit) or Closing
            // Default assump: Sell to Open = Credit Spread
            const isSell = side.startsWith('sell');
            // For credit spread: Short Leg is Sell, Long Leg is Buy.
            // For iron condor: Short Legs are Sell, Long Legs are Buy.

            let legs = [];

            if (strategy === 'credit_spread') {
                const type = optionTypeSelect.value;
                const shortSymbol = optionStrikeSelect.value;
                if (!type || !shortSymbol) return;

                const shortOpt = currentChain.find(o => o.symbol === shortSymbol);
                if (!shortOpt) return;

                const shortStrike = shortOpt.strike;
                let longStrike = type === 'call' ? shortStrike + spreadWidth : shortStrike - spreadWidth;

                // Find long leg
                // Allow some tolerance? Floating point?
                const longOpt = currentChain.find(o => o.option_type === type && Math.abs(o.strike - longStrike) < 0.01);

                // Short Leg
                legs.push({
                    description: `Sell ${type.toUpperCase()} ${shortStrike}`,
                    // logic: side is top level. If top is Sell, we sell this.
                    side: isSell ? 'sell_to_open' : 'buy_to_close',
                    option_symbol: shortSymbol,
                    quantity: 1
                });

                // Long Leg
                if (longOpt) {
                    legs.push({
                        description: `Buy ${type.toUpperCase()} ${longStrike}`,
                        side: isSell ? 'buy_to_open' : 'sell_to_close',
                        option_symbol: longOpt.symbol,
                        quantity: 1
                    });
                } else {
                    legs.push({ description: `Warning: Long strike ${longStrike} not found!` });
                }

            } else if (strategy === 'iron_condor') {
                const shortPutSym = shortPutSelect.value;
                const shortCallSym = shortCallSelect.value;

                if (shortPutSym) {
                    const sPut = currentChain.find(o => o.symbol === shortPutSym);
                    if (sPut) {
                        legs.push({
                            description: `Sell PUT ${sPut.strike}`,
                            side: isSell ? 'sell_to_open' : 'buy_to_close',
                            option_symbol: sPut.symbol,
                            quantity: 1
                        });

                        const longPutStrike = sPut.strike - spreadWidth;
                        const lPut = currentChain.find(o => o.option_type === 'put' && Math.abs(o.strike - longPutStrike) < 0.01);
                        if (lPut) {
                            legs.push({
                                description: `Buy PUT ${lPut.strike}`,
                                side: isSell ? 'buy_to_open' : 'sell_to_close',
                                option_symbol: lPut.symbol,
                                quantity: 1
                            });
                        } else {
                            legs.push({ description: `Warning: Long Put ${longPutStrike} not found` });
                        }
                    }
                }

                if (shortCallSym) {
                    const sCall = currentChain.find(o => o.symbol === shortCallSym);
                    if (sCall) {
                        legs.push({
                            description: `Sell CALL ${sCall.strike}`,
                            side: isSell ? 'sell_to_open' : 'buy_to_close',
                            option_symbol: sCall.symbol,
                            quantity: 1
                        });

                        const longCallStrike = sCall.strike + spreadWidth;
                        const lCall = currentChain.find(o => o.option_type === 'call' && Math.abs(o.strike - longCallStrike) < 0.01);
                        if (lCall) {
                            legs.push({
                                description: `Buy CALL ${lCall.strike}`,
                                side: isSell ? 'buy_to_open' : 'sell_to_close',
                                option_symbol: lCall.symbol,
                                quantity: 1
                            });
                        } else {
                            legs.push({ description: `Warning: Long Call ${longCallStrike} not found` });
                        }
                    }
                }
            }

            // Render Legs
            legsList.innerHTML = legs.map(l => {
                const color = l.description.includes('Warning') ? 'red' : 'inherit';
                return `<div style="color:${color}">${l.description}</div>`;
            }).join('');

            // Store for submit
            window.currentLegs = legs.filter(l => l.option_symbol); // only valid legs
        }

        // Re-calc legs on Side change too
        sideSelect.addEventListener('change', calculateLegs);

        // Toggle Type Fields
        typeSelect.addEventListener('change', () => {
            const val = typeSelect.value;
            if (val === 'limit' || val === 'stop_limit') {
                priceContainer.classList.remove('hidden');
            } else {
                priceContainer.classList.add('hidden');
            }
            if (val === 'stop' || val === 'stop_limit') {
                stopContainer.classList.remove('hidden');
            } else {
                stopContainer.classList.add('hidden');
            }
        });

        // Submit
        orderForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            btnSubmit.disabled = true;
            statusMessage.textContent = 'Submitting order...';
            statusMessage.style.color = 'var(--md-sys-color-on-surface)';

            const strategy = strategyInput.value;
            const assetClass = orderClassInput.value;

            const payload = {
                class: assetClass,
                symbol: document.getElementById('symbol').value,
                quantity: document.getElementById('quantity').value,
                type: typeSelect.value,
                duration: document.getElementById('duration').value
            };

            // Handling Strategies
            if (assetClass === 'option') {
                if (strategy === 'single') {
                    payload.option_symbol = document.getElementById('option_symbol').value;
                    payload.side = sideSelect.value;
                } else {
                    // Multileg
                    payload.class = 'multileg';
                    if (!window.currentLegs || window.currentLegs.length === 0) {
                        statusMessage.textContent = "Error: Incomplete legs";
                        statusMessage.style.color = 'red';
                        btnSubmit.disabled = false;
                        return;
                    }
                    // Map legs to payload format
                    // Need to apply quantity to legs
                    const q = Number(payload.quantity);
                    payload.legs = window.currentLegs.map(l => ({
                        option_symbol: l.option_symbol,
                        side: l.side,
                        quantity: q * l.quantity // usually 1:1 ratio
                    }));
                    // Note: 'side' param at top level might not be needed for multileg, legs carry side
                }
            } else {
                payload.side = sideSelect.value;
            }

            if (!priceContainer.classList.contains('hidden')) {
                payload.price = document.getElementById('price').value;
            }

            if (!stopContainer.classList.contains('hidden')) {
                payload.stop = document.getElementById('stop').value;
            }

            try {
                const res = await fetch('/api/orders', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await res.json();

                if (!res.ok) throw new Error(data.error || 'Failed to place order');

                statusMessage.textContent = `Success! Order ID: ${data.order.id} (${data.order.status})`;
                statusMessage.style.color = 'var(--md-sys-color-primary)';

            } catch (err) {
                console.error(err);
                statusMessage.textContent = `Error: ${err.message}`;
                statusMessage.style.color = 'var(--md-sys-color-error)';
            } finally {
                btnSubmit.disabled = false;
            }
        });

        // Initial init
        renderUI();
    });
</script>
{% endblock %}
