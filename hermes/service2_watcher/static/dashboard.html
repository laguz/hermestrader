<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Hermes Human Watcher</title>
<style>
  :root { color-scheme: dark; }
  body { font-family: ui-sans-serif, system-ui, sans-serif; background:#0e0f12; color:#e7e7ea;
         margin:0; padding:24px; }
  h1 { margin:0 0 16px; font-size:20px; letter-spacing:.5px; }
  .grid { display:grid; grid-template-columns: 1.4fr 1fr; gap:24px; }
  .card { background:#15171c; border:1px solid #232730; border-radius:10px; padding:16px;
          box-shadow:0 1px 0 #0006 inset; }
  .card h2 { margin:0 0 12px; font-size:14px; color:#9aa1ac; text-transform:uppercase;
             letter-spacing:1px; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th, td { padding:6px 8px; border-bottom:1px solid #232730; text-align:left; }
  th { color:#9aa1ac; font-weight:500; }
  .pos { color:#7be0a3; } .neg { color:#ff6f7d; }
  #logs { background:#0a0b0e; padding:10px; border-radius:6px; height:340px;
          overflow:auto; font-family: ui-monospace, monospace; font-size:12px; line-height:1.5; }
  .pill { display:inline-block; padding:2px 6px; border-radius:8px; font-size:11px;
          background:#1f2630; color:#7eb6ff; margin-right:4px; }
  .small { color:#9aa1ac; font-size:12px; }
  .wl-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap:14px; }
  .wl-panel { background:#0f1116; border:1px solid #232730; border-radius:8px; padding:12px; }
  .wl-panel header { display:flex; justify-content:space-between; align-items:center;
                     margin-bottom:8px; }
  .wl-panel h3 { margin:0; font-size:13px; letter-spacing:.5px; color:#e7e7ea; }
  .wl-panel .meta { font-size:11px; color:#9aa1ac; }
  .wl-tag { display:inline-flex; align-items:center; gap:6px; background:#1f2630;
            border-radius:14px; padding:3px 4px 3px 10px; font-size:12px; margin:2px; }
  .wl-tag button { background:transparent; border:0; color:#ff6f7d; cursor:pointer;
                   font-size:14px; padding:0 6px; }
  .wl-form { display:flex; gap:6px; margin-top:10px; }
  .wl-form input { flex:1; background:#0a0b0e; border:1px solid #232730; color:#e7e7ea;
                   padding:6px 8px; border-radius:6px; font-size:12px; text-transform:uppercase; }
  .wl-form button { background:#1f2630; border:1px solid #303644; color:#7eb6ff; cursor:pointer;
                    padding:6px 10px; border-radius:6px; font-size:12px; }
  .wl-empty { color:#6a6f7a; font-size:12px; font-style:italic; }
</style>
</head>
<body>
  <h1>HERMES — Human Watcher <span class="small">read-only command center</span></h1>

  <div class="grid">
    <div class="card">
      <h2>Live execution log</h2>
      <div id="logs"></div>
    </div>

    <div class="card">
      <h2>Daily realised PnL</h2>
      <canvas id="pnlChart" height="200"></canvas>
    </div>

    <div class="card" style="grid-column: span 2;">
      <h2>Strategy watchlists <span class="small">— per-strategy; empty list falls back to default</span></h2>
      <div id="watchlists" class="wl-grid"></div>
    </div>

    <div class="card" style="grid-column: span 2;">
      <h2>Open positions</h2>
      <table id="positions">
        <thead><tr>
          <th>Strategy</th><th>Symbol</th><th>Type</th><th>Lots</th><th>Short</th>
          <th>Long</th><th>Width</th><th>Credit</th><th>Expiry</th>
        </tr></thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="card" style="grid-column: span 2;">
      <h2>Entry-point view (rule + AI prediction)</h2>
      <table id="entries">
        <thead><tr>
          <th>Symbol</th><th>Spot</th><th>Predicted</th><th>Δ%</th>
          <th>Direction</th>
        </tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script>
const $ = (s) => document.querySelector(s);
const fmt = (n, d=2) => (n == null ? "—" : Number(n).toFixed(d));

async function refreshPositions() {
  const r = await fetch("/api/positions").then(r => r.json());
  const tbody = $("#positions tbody"); tbody.innerHTML = "";
  for (const p of r) {
    const tr = document.createElement("tr");
    tr.innerHTML = `<td><span class="pill">${p.strategy_id}</span></td>
      <td>${p.symbol}</td><td>${p.side_type}</td><td>${p.lots}</td>
      <td>${p.short_leg ?? ""}</td><td>${p.long_leg ?? ""}</td>
      <td>${fmt(p.width)}</td><td>${fmt(p.entry_credit)}</td>
      <td>${p.expiry ?? ""}</td>`;
    tbody.appendChild(tr);
  }
}

async function refreshEntries() {
  const r = await fetch("/api/predictions").then(r => r.json());
  const tbody = $("#entries tbody"); tbody.innerHTML = "";
  for (const p of r) {
    const ret = (p.predicted_return ?? 0) * 100;
    const dir = ret >= 0 ? "▲ bullish" : "▼ bearish";
    const cls = ret >= 0 ? "pos" : "neg";
    const tr = document.createElement("tr");
    tr.innerHTML = `<td>${p.symbol}</td>
      <td>${fmt(p.spot)}</td><td>${fmt(p.predicted_price)}</td>
      <td class="${cls}">${fmt(ret, 2)}%</td>
      <td class="${cls}">${dir}</td>`;
    tbody.appendChild(tr);
  }
}

let pnlChart;
async function refreshPnl() {
  const data = await fetch("/api/pnl").then(r => r.json());
  const labels = data.map(d => d.day);
  const values = data.map(d => Number(d.realized_pnl ?? 0));
  if (!pnlChart) {
    pnlChart = new Chart($("#pnlChart"), {
      type: "bar",
      data: { labels, datasets: [{ label: "Realised", data: values,
        backgroundColor: values.map(v => v >= 0 ? "#7be0a3" : "#ff6f7d") }] },
      options: { plugins: { legend: { display: false } },
        scales: { x: { ticks: { color: "#9aa1ac" } }, y: { ticks: { color: "#9aa1ac" } } } }
    });
  } else {
    pnlChart.data.labels = labels;
    pnlChart.data.datasets[0].data = values;
    pnlChart.data.datasets[0].backgroundColor =
      values.map(v => v >= 0 ? "#7be0a3" : "#ff6f7d");
    pnlChart.update();
  }
}

function streamLogs() {
  const ws = new WebSocket(`ws://${location.host}/ws/logs`);
  ws.onmessage = (e) => {
    const box = $("#logs");
    const div = document.createElement("div");
    div.textContent = e.data;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  };
  ws.onclose = () => setTimeout(streamLogs, 2000);
}

// ---------------------------------------------------------------------
// Per-strategy watchlist management
// ---------------------------------------------------------------------
const STRATEGIES = ["CS75", "CS7", "TT45", "WHEEL"];
let DEFAULT_WL = [];

async function loadHealth() {
  try {
    const h = await fetch("/api/health").then(r => r.json());
    DEFAULT_WL = h.default_watchlist || [];
  } catch (e) { /* ignore */ }
}

async function refreshWatchlists() {
  const data = await fetch("/api/watchlists").then(r => r.json());
  const root = $("#watchlists"); root.innerHTML = "";
  for (const sid of STRATEGIES) {
    const symbols = data[sid] || [];
    const usingDefault = symbols.length === 0;
    const effective = usingDefault ? DEFAULT_WL : symbols;
    const panel = document.createElement("div");
    panel.className = "wl-panel";
    panel.innerHTML = `
      <header>
        <h3>${sid}</h3>
        <span class="meta">${effective.length} effective${usingDefault ? " (default)" : ""}</span>
      </header>
      <div class="wl-symbols"></div>
      <form class="wl-form" data-sid="${sid}">
        <input type="text" placeholder="Add symbol e.g. SPY" maxlength="16" required />
        <button type="submit">Add</button>
      </form>
    `;
    const tags = panel.querySelector(".wl-symbols");
    if (symbols.length === 0) {
      tags.innerHTML = `<div class="wl-empty">Using default: ${DEFAULT_WL.join(", ") || "—"}</div>`;
    } else {
      for (const sym of symbols) {
        const tag = document.createElement("span");
        tag.className = "wl-tag";
        tag.innerHTML = `${sym} <button title="remove" data-sid="${sid}" data-sym="${sym}">×</button>`;
        tags.appendChild(tag);
      }
    }
    root.appendChild(panel);
  }
}

document.addEventListener("submit", async (e) => {
  if (!e.target.classList.contains("wl-form")) return;
  e.preventDefault();
  const sid = e.target.dataset.sid;
  const input = e.target.querySelector("input");
  const symbol = (input.value || "").trim().toUpperCase();
  if (!symbol) return;
  const r = await fetch(`/api/watchlists/${sid}`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ symbol }),
  });
  if (!r.ok) {
    const detail = await r.json().catch(() => ({}));
    alert(`Add failed: ${detail.detail || r.statusText}`);
    return;
  }
  input.value = "";
  refreshWatchlists();
});

document.addEventListener("click", async (e) => {
  if (e.target.tagName !== "BUTTON" || !e.target.dataset.sym) return;
  const { sid, sym } = e.target.dataset;
  if (!confirm(`Remove ${sym} from ${sid}?`)) return;
  const r = await fetch(`/api/watchlists/${sid}/${sym}`, { method: "DELETE" });
  if (!r.ok) {
    const detail = await r.json().catch(() => ({}));
    alert(`Remove failed: ${detail.detail || r.statusText}`);
    return;
  }
  refreshWatchlists();
});

streamLogs();
loadHealth().then(refreshWatchlists);
refreshPositions(); refreshEntries(); refreshPnl();
setInterval(refreshPositions, 10_000);
setInterval(refreshEntries, 15_000);
setInterval(refreshPnl, 30_000);
setInterval(refreshWatchlists, 20_000);
</script>
</body>
</html>
