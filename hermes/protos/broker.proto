syntax = "proto3";

package hermes;

message Empty {}

message OptionLeg {
    string option_symbol = 1;
    int32 quantity = 2;
    string side = 3;
    string action = 4;
}

message MultiLegOrder {
    string strategy_id = 1;
    string symbol = 2;
    string order_class = 3;
    repeated OptionLeg legs = 4;
    float price = 5;
    string side = 6;
    int32 quantity = 7;
    string duration = 8;
    string order_type = 9;
    string tag = 10;
    string expiry = 11;
    float width = 12;
}

message ExecutionReport {
    string order_id = 1;
    string status = 2;
    int32 filled_quantity = 3;
    float avg_fill_price = 4;
    string transaction_time = 5;
    string raw_response_json = 6;
}

message BrokerPosition {
    string symbol = 1;
    float quantity = 2;
    float cost_basis = 3;
    string date_acquired = 4;
}

message MarketQuote {
    string symbol = 1;
    float price = 2;
    float bid = 3;
    float ask = 4;
    int64 volume = 5;
    string timestamp = 6;
}

message SystemCommand {
    string command_type = 1;
    string payload_json = 2;
    string timestamp = 3;
}

message CommandResponse {
    string status = 1;
    string message = 2;
}

message BalancesResponse {
    double option_buying_power = 1;
    double stock_buying_power = 2;
    double total_equity = 3;
    double cash = 4;
    string account_type = 5;
    double margin_buying_power = 6;
}

message ExpirationsRequest {
    string symbol = 1;
}

message ExpirationsResponse {
    repeated string expirations = 1;
}

message OptionChainsRequest {
    string symbol = 1;
    string expiry = 2;
}

message JSONResponse {
    string data_json = 1;
}

message QuoteRequest {
    string symbols = 1;
}

message DeltaRequest {
    string option_symbol = 1;
}

message DeltaResponse {
    double delta = 1;
}

message HistoryRequest {
    string symbol = 1;
    string interval = 2;
    string start = 3;
    string end = 4;
}

message AnalyzeRequest {
    string symbol = 1;
    string period = 2;
}

message RollRequest {
    string option_symbol = 1;
}

message RollResponse {
    string next_option_symbol = 1;
}

message CancelOrderRequest {
    string order_id = 1;
}

service BrokerService {
    rpc StreamCommands (Empty) returns (stream SystemCommand);
    rpc SubmitOrder (MultiLegOrder) returns (ExecutionReport);
    rpc QueryPositions (Empty) returns (stream BrokerPosition);
    rpc StreamQuotes (Empty) returns (stream MarketQuote);

    rpc GetAccountBalances (Empty) returns (BalancesResponse);
    rpc GetOrders (Empty) returns (JSONResponse);
    rpc CancelOrder (CancelOrderRequest) returns (JSONResponse);
    rpc GetOptionExpirations (ExpirationsRequest) returns (ExpirationsResponse);
    rpc GetOptionChains (OptionChainsRequest) returns (JSONResponse);
    rpc GetQuote (QuoteRequest) returns (JSONResponse);
    rpc GetDelta (DeltaRequest) returns (DeltaResponse);
    rpc GetHistory (HistoryRequest) returns (JSONResponse);
    rpc AnalyzeSymbol (AnalyzeRequest) returns (JSONResponse);
    rpc RollToNextMonth (RollRequest) returns (RollResponse);
}
