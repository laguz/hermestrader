[pytest]
# Restrict discovery to the real suite so stray test_*.py scripts elsewhere
# in the tree (scratch experiments, etc.) can't be auto-collected and pollute
# shared state for the real tests.
testpaths = tests

# Surface warnings (e.g. the FastAPI `regex=`->`pattern=` deprecation in
# ml_diagnostics.py) instead of silently swallowing them.
filterwarnings =
    default

# Optional: drop the need for @pytest.mark.asyncio on every async test.
# asyncio_mode = auto
