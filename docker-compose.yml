services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/investment_db
      - TRADIER_API_KEY=${TRADIER_API_KEY}
      - TRADIER_ACCOUNT_ID=${TRADIER_ACCOUNT_ID}
    depends_on:
      - mongodb
    volumes:
      - .:/app
    restart: always

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: always

volumes:
  mongodb_data:
