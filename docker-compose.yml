version: '3.8'

services:
  db:
    image: timescale/timescaledb:latest-pg15
    environment:
      POSTGRES_DB: hermes
      POSTGRES_USER: hermes
      POSTGRES_PASSWORD: hermes
    volumes:
      - hermes_db_data:/var/lib/postgresql/data
      - ./hermes/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hermes -d hermes"]
      interval: 10s
      timeout: 5s
      retries: 5

  watcher:
    build: .
    command: uvicorn hermes.service2_watcher.api:app --host 0.0.0.0 --port 8081
    ports:
      - "8081:8081"
    environment:
      - HERMES_DSN=postgresql+psycopg://hermes:hermes@db:5432/hermes
      - HERMES_WATCHLIST=AAPL,SPY,QQQ,NVDA,AMD,KO
    depends_on:
      db:
        condition: service_healthy

  agent:
    build: .
    command: python -m hermes.service1_agent.main
    environment:
      - HERMES_DSN=postgresql+psycopg://hermes:hermes@db:5432/hermes
      - HERMES_WATCHLIST=AAPL,SPY,QQQ,NVDA,AMD,KO
      - HERMES_TICK_INTERVAL=300
      - HERMES_AI_AUTONOMY=advisory
      - HERMES_DRY_RUN=true
      - TRADIER_ACCESS_TOKEN=${TRADIER_ACCESS_TOKEN:-}
      - TRADIER_ACCOUNT_ID=${TRADIER_ACCOUNT_ID:-}
      - TRADIER_BASE_URL=${TRADIER_BASE_URL:-https://api.tradier.com/v1}
    depends_on:
      db:
        condition: service_healthy

  mcp:
    build: .
    command: python -m hermes.mcp.server
    stdin_open: true
    tty: true
    environment:
      - TRADIER_ACCESS_TOKEN=${TRADIER_ACCESS_TOKEN:-}
      - TRADIER_ACCOUNT_ID=${TRADIER_ACCOUNT_ID:-}
      - TRADIER_BASE_URL=${TRADIER_BASE_URL:-https://api.tradier.com/v1}
      - HERMES_DRY_RUN=${HERMES_DRY_RUN:-true}

volumes:
  hermes_db_data:
