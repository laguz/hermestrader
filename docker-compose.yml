# ── HermesTrader compose — drives BOTH paper and live instances ──────────────
#
# How it works
# ------------
# Every variable below has a default that matches the original paper-only
# layout (port 8081, db port 5433, project name `hermestrader`). To run a
# *second* instance side-by-side, point at a different env file:
#
#   docker compose --env-file .env.paper -p hermes-paper up -d
#   docker compose --env-file .env.live  -p hermes-live  up -d
#
# Each instance gets:
#   * its own COMPOSE_PROJECT_NAME → distinct container/volume namespaces
#   * its own host port for the watcher (HERMES_API_PORT)
#   * its own host port for Postgres (HERMES_DB_PORT)
#   * its own ~/.hermes-* data dir (HERMES_DATA_DIR) bind-mounted into /data
#   * its own image tag (HERMES_TAG) — paper rides `latest`, live pins to `stable`
#
# Security: the watcher runs with all Linux capabilities dropped except
# NET_BIND_SERVICE; broker credentials live in the env file, never the image.

services:
  db:
    image: timescale/timescaledb:latest-pg15
    environment:
      POSTGRES_DB: hermes
      POSTGRES_USER: hermes
      POSTGRES_PASSWORD: hermes
    volumes:
      - hermes_db_data:/var/lib/postgresql/data
      - ./hermes/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "${HERMES_DB_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hermes -d hermes"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true

  watcher:
    image: ${HERMES_IMAGE:-laguz3/hermes}:${HERMES_TAG:-latest}
    build: .
    # The watcher binds inside the container on a fixed port (8080) and we
    # publish it on the host using HERMES_API_PORT. Keeping the in-container
    # port stable means health checks and inter-service URLs don't have to
    # know which instance they're in.
    command: uvicorn hermes.service2_watcher.api:app --host 0.0.0.0 --port 8080 --reload --reload-dir /app/hermes
    ports:
      - "${HERMES_API_PORT:-8081}:8080"
    env_file: ${HERMES_ENV_FILE:-.env}
    environment:
      - HERMES_DSN=postgresql+psycopg://hermes:hermes@db:5432/hermes
      - HERMES_MODE=${HERMES_MODE:-paper}
      - HERMES_INSTANCE=${COMPOSE_PROJECT_NAME:-hermes-paper}
      - HERMES_UPGRADE_MARKER=/data/upgrade_requested
    volumes:
      # Source code: live-mounted read-only so host edits show up without
      # a rebuild. The watcher never writes here.
      - ./hermes:/app/hermes:ro
      - ./requirements.txt:/app/requirements.txt:ro
      # Hermes data dir: persists agent memory, skill state, and upgrade
      # markers across container restarts. Per-instance on the host.
      - ${HERMES_DATA_DIR:-./.hermes-data}:/data
      - ./soul.md:/app/soul.md:rw
    depends_on:
      db:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request,sys; sys.exit(0 if urllib.request.urlopen(\"http://localhost:8080/api/health\",timeout=2).status==200 else 1)'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  agent:
    image: ${HERMES_IMAGE:-laguz3/hermes}:${HERMES_TAG:-latest}
    build: .
    command: python -m hermes.service1_agent.main
    env_file: ${HERMES_ENV_FILE:-.env}
    environment:
      - HERMES_DSN=postgresql+psycopg://hermes:hermes@db:5432/hermes
      - HERMES_MODE=${HERMES_MODE:-paper}
      - HERMES_INSTANCE=${COMPOSE_PROJECT_NAME:-hermes-paper}
    volumes:
      - ./hermes:/app/hermes:ro
      - ./requirements.txt:/app/requirements.txt:ro
      - ${HERMES_DATA_DIR:-./.hermes-data}:/data
      - ./soul.md:/app/soul.md:ro
    depends_on:
      db:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  mcp:
    image: ${HERMES_IMAGE:-laguz3/hermes}:${HERMES_TAG:-latest}
    build: .
    command: python -m hermes.mcp.server
    stdin_open: true
    tty: true
    env_file: ${HERMES_ENV_FILE:-.env}
    environment:
      - HERMES_INSTANCE=${COMPOSE_PROJECT_NAME:-hermes-paper}
    volumes:
      - ./hermes:/app/hermes:ro
      - ./requirements.txt:/app/requirements.txt:ro
      - ${HERMES_DATA_DIR:-./.hermes-data}:/data
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  hermes_db_data:
