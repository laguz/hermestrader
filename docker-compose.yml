services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - MONGODB_URI=mongodb://host.docker.internal:27017/investment_db
      - GUNICORN_CMD_ARGS=--workers 1 --worker-class sync --timeout 600 --bind 0.0.0.0:8080
      - FLASK_SECRET_KEY=Rbq7i5R2ru5EXo
      - TRADIER_ACCESS_TOKEN=7xVW1wTgL4DwxD4dGFDZieCIl1ta
      - TRADIER_ACCOUNT_ID=VA60129978
      - TRADIER_ENDPOINT=https://sandbox.tradier.com/v1
      - OMP_NUM_THREADS=1
      - MKL_NUM_THREADS=1
      - TF_ENABLE_ONEDNN_OPTS=0
    volumes:
      - .:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G
