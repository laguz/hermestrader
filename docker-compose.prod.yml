services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - MONGODB_URI=${MONGODB_URI:-mongodb://host.docker.internal:27017/investment_db}
      - GUNICORN_CMD_ARGS=--workers 1 --worker-class gthread --threads 4 --timeout 120 --bind 0.0.0.0:8080
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY}
      - TRADIER_ACCESS_TOKEN=${TRADIER_ACCESS_TOKEN}
      - TRADIER_ACCOUNT_ID=${TRADIER_ACCOUNT_ID}
      - TRADIER_ENDPOINT=${TRADIER_ENDPOINT:-https://sandbox.tradier.com/v1}
    volumes:
      - .:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
