name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Allow Jules / other coding agents to run CI on their PRs without permissions
# escalation issues.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff

      - name: Lint (ruff)
        # Non-blocking on warnings — only fail on syntax errors / undefined
        # names so the full ruff ruleset doesn't gate every PR yet.
        run: ruff check --select E9,F63,F7,F82 hermes tests

      - name: Run tests
        run: pytest tests -q
        env:
          HERMES_DSN: "sqlite:///:memory:"
